version: '3.8'
services:
  redis:
    image: redis:7-alpine
    ports: ['6379:6379']
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ustc_chat
    ports: ['3306:3306']
    volumes:
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
  backend:
    build: .
    depends_on: [redis, mysql]
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root
      REDIS_HOST: redis
    ports: ['8080:8080']
